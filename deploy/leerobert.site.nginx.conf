server
{
    listen 80;
    listen 443 ssl;
    listen [::]:80;
    listen [::]:443 ssl;
    http2 on;
    server_name leerobert.site www.leerobert.site;
    root /www/wwwroot/leerobert.site;

    ssl_certificate    /www/server/panel/vhost/cert/leerobert.site/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/leerobert.site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;

    if ($server_port = 80) {
        return 301 https://$server_name$request_uri;
    }

    location /assets/ {
        alias /www/wwwroot/leerobert.site/heritage-lens/backend/static/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /images/ {
        alias /www/wwwroot/leerobert.site/heritage-lens/backend/static/images/;
        expires 30d;
    }

    location /static/ {
        alias /www/wwwroot/leerobert.site/heritage-lens/backend/static/;
        expires 30d;
    }

    location /heritage-lens/ {
        rewrite ^/heritage-lens/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:5678;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /www/wwwlogs/leerobert.site.log;
    error_log /www/wwwlogs/leerobert.site.error.log;
}
